name = "reviewer-proxy"
main = "reviewer-proxy.js"
compatibility_date = "2024-09-01"

# 部署前：把 reviewer-proxy.js 里的 TARGET 改成你的 https://<项目>.vercel.app
# 账号/区域由环境变量 CLOUDFLARE_API_TOKEN 决定（部署时传入，不写在此文件）。
# 路由在 Cloudflare 控制台手动添加，或用下方 routes（需填写你的 zone_name）：
# routes = [
#   { pattern = "apps.endril.com/reviewer/*", zone_name = "endril.com" }
# ]
