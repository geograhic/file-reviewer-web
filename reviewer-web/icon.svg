<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e293b"/>
      <stop offset="1" stop-color="#0b1220"/>
    </linearGradient>
  </defs>

  <!-- rounded-square background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- solid white document (filled, with folded corner) -->
  <path d="M150 110 h150 l44 44 v250 a16 16 0 0 1 -16 16 H150 a16 16 0 0 1 -16 -16 V126 a16 16 0 0 1 16 -16 Z"
        fill="#ffffff"/>
  <!-- folded corner -->
  <path d="M300 110 l44 44 H300 Z" fill="#cbd5e1"/>

  <!-- blue text lines (brand accent) -->
  <g fill="#3b82f6">
    <rect x="180" y="214" width="140" height="22" rx="11"/>
    <rect x="180" y="260" width="140" height="22" rx="11"/>
    <rect x="180" y="306" width="96"  height="22" rx="11"/>
  </g>
</svg>
